<!-- 
  GYM FLOW - CONTROL DE VERSIONES 
  v1.0.0: Versión inicial con lógica de entrenamiento.
  v1.1.0: Optimización de imágenes (140px), tarjetas compactas y estilos neón mejorados.
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM FLOW v1.1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #15151e;
            --neon: #f5ff4e;
            --pink: #ff4e6a;
            --text: #ffffff;
            --version: "v1.1.0"; /* Variable de versión en CSS */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- MARCA DE VERSIÓN INVISIBLE EN UI --- */
        body::after {
            content: var(--version);
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: #333;
            pointer-events: none;
        }

        h1, h2, h3 { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilos Home */
        #s-home { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 90vh; }
        .logo { font-size: 4.5rem; color: var(--neon); text-shadow: 0 0 20px rgba(245, 255, 78, 0.3); }
        
        .btn {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 16px 30px;
            font-family: 'Bebas Neue';
            font-size: 1.6rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(245, 255, 78, 0.2);
        }
        .btn:active { transform: scale(0.98); filter: brightness(0.9); }

        /* Selección */
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .chip {
            background: #1a1a24;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .chip.selected { border-color: var(--neon); background: #252535; color: var(--neon); }

        /* --- TARJETAS COMPACTAS (VERSIÓN 1.1.0) --- */
        .exercise-card {
            background: var(--card);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ex-img {
            width: 100%;
            height: 140px; /* Reducción confirmada */
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            background: #1a1a24;
        }

        .exercise-card h3 { font-size: 1.3rem; color: var(--neon); margin: 0; }
        .exercise-card p { font-size: 0.85rem; color: #aaa; margin: 0; line-height: 1.3; }

        .ex-meta {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--pink);
            display: flex;
            justify-content: space-between;
            background: rgba(255, 78, 106, 0.05);
            padding: 8px;
            border-radius: 6px;
        }

        #lightbox {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #lightbox img { max-width: 90%; max-height: 80vh; border: 2px solid var(--neon); }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img src="" id="lb-img"></div>

<div class="container">
    <section id="s-home" class="screen active">
        <h1 class="logo">GYM FLOW</h1>
        <p style="color: #666; margin-bottom: 40px;">v1.1.0 | Compact Edition</p>
        <button class="btn" onclick="nav('s-select')">EMPEZAR</button>
    </section>

    <section id="s-select" class="screen">
        <h2 style="margin-bottom: 20px; font-size: 2rem;">ENTRENAMIENTO</h2>
        <div class="grid-select" id="muscle-grid"></div>
        <div style="margin-bottom: 25px;">
            <label style="font-size: 0.8rem; color: #666;">CANTIDAD DE EJERCICIOS</label>
            <input type="number" id="ex-count" value="6" 
                   style="width: 100%; padding: 12px; background: #1a1a24; color: white; border: 1px solid #333; border-radius: 8px; font-size: 1rem;">
        </div>
        <button class="btn" onclick="generateWorkout()">GENERAR RUTINA</button>
    </section>

    <section id="s-workout" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>RUTINA</h2>
            <button onclick="nav('s-select')" style="color: var(--pink); background: none; border: none; font-weight: bold;">EDITAR</button>
        </div>
        <div id="workout-list"></div>
        <button class="btn" onclick="nav('s-done')" style="background: var(--pink); color: white; margin-top: 20px;">TERMINAR</button>
    </section>

    <section id="s-done" class="screen" style="text-align: center; padding-top: 100px;">
        <h1 style="font-size: 4rem; color: var(--neon);">FIN</h1>
        <p>Entrenamiento guardado.</p>
        <button class="btn" onclick="location.reload()" style="margin-top: 40px;">NUEVO INICIO</button>
    </section>
</div>

<script>
    const APP_VERSION = "1.1.0";
    console.log(`%c GYM FLOW v${APP_VERSION} Activa `, "background: #f5ff4e; color: #000; font-weight: bold;");

    const EXERCISES = {
        'Pecho': [
            { n: 'Press Mancuernas', d: 'Empuje vertical desde banco.', e: 'Banco + Mancuernas', s: '4x12' },
            { n: 'Aperturas', d: 'Movimiento circular hacia el centro.', e: 'Mancuernas', s: '3x15' }
        ],
        'Espalda': [
            { n: 'Remo Unilateral', d: 'Tracción hacia la cadera con apoyo.', e: 'Banco + Mancuerna', s: '4x10' },
            { n: 'Remo Banda', d: 'Tracción controlada con banda.', e: 'Banda Elástica', s: '4x15' }
        ],
        'Piernas': [
            { n: 'Sentadilla Goblet', d: 'Baja con peso al pecho.', e: 'Mancuerna', s: '4x12' },
            { n: 'Zancadas', d: 'Paso largo y descenso vertical.', e: 'Mancuernas', s: '3x12' }
        ],
        'Bíceps': [{ n: 'Curl Alterno', d: 'Flexión de codo con giro.', e: 'Mancuernas', s: '3x12' }],
        'Tríceps': [{ n: 'Copa Tríceps', d: 'Extensión tras la nuca.', e: 'Mancuerna', s: '3x12' }]
    };

    const IMAGES = {
        'Press Mancuernas': 'img/Pecho_01.jpg',
        'Aperturas': 'img/Pecho_02.jpg',
        'Remo Unilateral': 'img/Espalda_01.jpg',
        'Remo Banda': 'img/Espalda_02.jpg',
        'Sentadilla Goblet': 'img/Piernas_01.jpg',
        'Zancadas': 'img/Piernas_02.jpg',
        'Curl Alterno': 'img/Biceps_01.jpg',
        'Copa Tríceps': 'img/Triceps_01.jpg'
    };

    let selectedMuscles = [];

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function initGrid() {
        const grid = document.getElementById('muscle-grid');
        Object.keys(EXERCISES).forEach(m => {
            const div = document.createElement('div');
            div.className = 'chip';
            div.innerText = m;
            div.onclick = () => {
                div.classList.toggle('selected');
                if(selectedMuscles.includes(m)) selectedMuscles = selectedMuscles.filter(i => i !== m);
                else selectedMuscles.push(m);
            };
            grid.appendChild(div);
        });
    }

    function generateWorkout() {
        if(selectedMuscles.length === 0) return alert("Selecciona zonas");
        const count = document.getElementById('ex-count').value;
        const pool = [];
        selectedMuscles.forEach(m => pool.push(...EXERCISES[m]));
        const selected = pool.sort(() => 0.5 - Math.random()).slice(0, count);

        const list = document.getElementById('workout-list');
        list.innerHTML = '';
        selected.forEach(ex => {
            const imgPath = IMAGES[ex.n] || 'https://via.placeholder.com/400x200?text=SIN+IMAGEN';
            list.innerHTML += `
                <div class="exercise-card">
                    <img src="${imgPath}" class="ex-img" onclick="showLB(this.src)" onerror="this.src='https://via.placeholder.com/400x200?text=IMAGEN+PENDIENTE'">
                    <h3>${ex.n}</h3>
                    <p>${ex.d}</p>
                    <div class="ex-meta">
                        <span>${ex.e}</span>
                        <span>${ex.s}</span>
                    </div>
                </div>`;
        });
        nav('s-workout');
    }

    function showLB(src) {
        document.getElementById('lb-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    initGrid();
</script>
</body>
</html>
