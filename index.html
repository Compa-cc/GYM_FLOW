<!-- 
  GYM FLOW - CONTROL DE VERSIONES 
  v1.1.1: Retorno a lógica/diseño original con corrección de tamaño de imagen (140px).
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #15151e;
            --neon: #f5ff4e;
            --pink: #ff4e6a;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        h1, h2, h3 { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Pantallas */
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; }

        /* Estilos Home */
        #s-home { text-align: center; padding-top: 100px; }
        .logo { font-size: 4rem; color: var(--neon); margin-bottom: 10px; }
        
        /* Botones */
        .btn {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Bebas Neue';
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        /* Selección de Zonas */
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .chip {
            background: #1a1a24;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .chip.selected { border-color: var(--neon); }

        /* --- CAMBIO SOLICITADO: VISTA PREVIA REDUCIDA --- */
        .exercise-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 3px solid var(--neon);
        }

        .ex-img {
            width: 100%;
            height: 140px; /* Tamaño reducido aplicado */
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .exercise-card h3 { color: var(--neon); margin-bottom: 5px; }

        .ex-meta {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--pink);
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #lightbox img { max-width: 90%; max-height: 80vh; }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img src="" id="lb-img"></div>

<div class="container">
    <section id="s-home" class="screen active">
        <h1 class="logo">GYM FLOW</h1>
        <button class="btn" onclick="nav('s-select')">EMPEZAR</button>
    </section>

    <section id="s-select" class="screen">
        <h2>ZONAS</h2>
        <div class="grid-select" id="muscle-grid"></div>
        <div style="margin-bottom: 20px;">
            <label>EJERCICIOS:</label>
            <input type="number" id="ex-count" value="6" style="width: 100%; padding: 10px; margin-top: 5px;">
        </div>
        <button class="btn" onclick="generateWorkout()">GENERAR</button>
    </section>

    <section id="s-workout" class="screen">
        <h2>RUTINA</h2>
        <div id="workout-list"></div>
        <button class="btn" onclick="nav('s-done')" style="margin-top: 20px; background: var(--pink); color: white;">TERMINAR</button>
    </section>

    <section id="s-done" class="screen">
        <h1>¡LISTO!</h1>
        <button class="btn" onclick="location.reload()" style="margin-top: 30px;">INICIO</button>
    </section>
</div>

<script>
    const EXERCISES = {
        'Pecho': [{ n: 'Press Mancuernas', d: 'Empuje desde banco.', e: 'Banco + Mancuernas', s: '4x12' }],
        'Espalda': [{ n: 'Remo Unilateral', d: 'Tracción con apoyo.', e: 'Banco + Mancuerna', s: '4x10' }],
        'Piernas': [{ n: 'Sentadillas', d: 'Descenso controlado.', e: 'Mancuerna', s: '4x12' }],
        'Bíceps': [{ n: 'Curl', d: 'Flexión de codo.', e: 'Mancuernas', s: '3x12' }],
        'Tríceps': [{ n: 'Copa', d: 'Extensión tras nuca.', e: 'Mancuerna', s: '3x12' }]
    };

    const IMAGES = {
        'Press Mancuernas': 'img/Pecho_01.jpg',
        'Remo Unilateral': 'img/Espalda_01.jpg',
        'Sentadillas': 'img/Piernas_01.jpg',
        'Curl': 'img/Biceps_01.jpg',
        'Copa': 'img/Triceps_01.jpg'
    };

    let selectedMuscles = [];

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initGrid() {
        const grid = document.getElementById('muscle-grid');
        Object.keys(EXERCISES).forEach(m => {
            const div = document.createElement('div');
            div.className = 'chip';
            div.innerText = m;
            div.onclick = () => {
                div.classList.toggle('selected');
                if(selectedMuscles.includes(m)) selectedMuscles = selectedMuscles.filter(i => i !== m);
                else selectedMuscles.push(m);
            };
            grid.appendChild(div);
        });
    }

    function generateWorkout() {
        if(selectedMuscles.length === 0) return;
        const count = document.getElementById('ex-count').value;
        const pool = [];
        selectedMuscles.forEach(m => pool.push(...EXERCISES[m]));
        const selected = pool.sort(() => 0.5 - Math.random()).slice(0, count);

        const list = document.getElementById('workout-list');
        list.innerHTML = '';
        selected.forEach(ex => {
            const imgPath = IMAGES[ex.n] || '';
            list.innerHTML += `
                <div class="exercise-card">
                    <img src="${imgPath}" class="ex-img" onclick="showLB(this.src)" onerror="this.style.display='none'">
                    <h3>${ex.n}</h3>
                    <p>${ex.d}</p>
                    <div class="ex-meta">
                        <span>${ex.e}</span>
                        <span>${ex.s}</span>
                    </div>
                </div>`;
        });
        nav('s-workout');
    }

    function showLB(src) {
        document.getElementById('lb-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    initGrid();
</script>
</body>
</html>
