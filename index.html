<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM FLOW | Entrenador Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #15151e;
            --neon: #f5ff4e;
            --pink: #ff4e6a;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Pantallas */
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilos Home */
        #s-home { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .logo { font-size: 4rem; color: var(--neon); margin-bottom: 10px; }
        
        /* Botones */
        .btn {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Bebas Neue';
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        /* Selección de Zonas */
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .chip {
            background: #1a1a24;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .chip.selected { border-color: var(--neon); background: #252535; }

        /* --- TARJETAS COMPACTAS (Actualizado) --- */
        .exercise-card {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 3px solid var(--neon);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ex-img {
            width: 100%;
            height: 140px; /* Tamaño reducido solicitado */
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            background: #1a1a24;
            transition: transform 0.2s;
        }

        .ex-img:hover { transform: scale(1.02); filter: brightness(1.1); }

        .exercise-card h3 { font-size: 1.2rem; color: var(--neon); margin: 0; }
        .exercise-card p { font-size: 0.85rem; color: #ccc; margin: 0; }

        .ex-meta {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--pink);
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #222;
            padding-top: 8px;
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #lightbox img { max-width: 100%; max-height: 80vh; border-radius: 8px; }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img src="" id="lb-img"></div>

<div class="container">
    <!-- PANTALLA INICIO -->
    <section id="s-home" class="screen active">
        <h1 class="logo">GYM FLOW</h1>
        <p style="margin-bottom: 30px; color: #888;">Tu equipo: Mancuernas, Banda y Banco</p>
        <button class="btn" onclick="nav('s-select')">EMPEZAR ENTRENAMIENTO</button>
    </section>

    <!-- PANTALLA SELECCIÓN -->
    <section id="s-select" class="screen">
        <h2 style="margin-bottom: 20px;">¿QUÉ ENTRENAMOS HOY?</h2>
        <div class="grid-select" id="muscle-grid">
            <!-- Se genera con JS -->
        </div>
        <div style="margin-bottom: 20px;">
            <label>CANTIDAD DE EJERCICIOS:</label>
            <input type="number" id="ex-count" value="6" min="1" max="15" 
                   style="width: 100%; padding: 10px; background: #1a1a24; color: white; border: none; border-radius: 8px; margin-top: 5px;">
        </div>
        <button class="btn" onclick="generateWorkout()">GENERAR RUTINA</button>
    </section>

    <!-- PANTALLA RUTINA -->
    <section id="s-workout" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>TU RUTINA</h2>
            <button onclick="nav('s-select')" style="background: none; border: none; color: var(--pink); font-weight: bold;">CAMBIAR</button>
        </div>
        <div id="workout-list"></div>
        <button class="btn" onclick="nav('s-done')" style="margin-top: 20px; background: var(--pink); color: white;">TERMINAR SESIÓN</button>
    </section>

    <!-- PANTALLA FINAL -->
    <section id="s-done" class="screen" style="text-align: center;">
        <h1 style="font-size: 3rem; color: var(--neon);">¡LOGRADO!</h1>
        <p>Has completado tu entrenamiento con éxito.</p>
        <button class="btn" onclick="location.reload()" style="margin-top: 30px;">VOLVER AL INICIO</button>
    </section>
</div>

<script>
    // BASE DE DATOS
    const EXERCISES = {
        'Pecho': [
            { n: 'Press con Mancuernas', d: 'En banco plano, empuja hacia arriba.', e: 'Banco + Mancuernas', s: '4x12' },
            { n: 'Aperturas', d: 'Brazos extendidos, cierra al centro.', e: 'Mancuernas', s: '3x15' }
        ],
        'Espalda': [
            { n: 'Remo a una mano', d: 'Apoya una mano en banco y rema.', e: 'Banco + Mancuerna', s: '4x10' },
            { n: 'Remo con Banda', d: 'Tira de la banda hacia tu cadera.', e: 'Banda Elástica', s: '4x15' }
        ],
        'Piernas': [
            { n: 'Sentadilla Goblet', d: 'Mancuerna al pecho y baja.', e: 'Mancuerna', s: '4x12' },
            { n: 'Zancadas', d: 'Paso largo y baja rodilla trasera.', e: 'Mancuernas', s: '3x12' }
        ],
        'Bíceps': [
            { n: 'Curl Alterno', d: 'Giro de muñeca al subir.', e: 'Mancuernas', s: '3x12' }
        ],
        'Tríceps': [
            { n: 'Copa a dos manos', d: 'Mancuerna tras la nuca.', e: 'Mancuerna', s: '3x12' }
        ]
    };

    const IMAGES = {
        'Press con Mancuernas': 'img/Pecho_01.jpg',
        'Aperturas': 'img/Pecho_02.jpg',
        'Remo a una mano': 'img/Espalda_01.jpg',
        'Remo con Banda': 'img/Espalda_02.jpg',
        'Sentadilla Goblet': 'img/Piernas_01.jpg',
        'Zancadas': 'img/Piernas_02.jpg',
        'Curl Alterno': 'img/Biceps_01.jpg',
        'Copa a dos manos': 'img/Triceps_01.jpg'
    };

    let selectedMuscles = [];

    // NAVEGACIÓN
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    // INICIALIZAR GRID
    function initGrid() {
        const grid = document.getElementById('muscle-grid');
        Object.keys(EXERCISES).forEach(m => {
            const div = document.createElement('div');
            div.className = 'chip';
            div.innerText = m;
            div.onclick = () => {
                div.classList.toggle('selected');
                if(selectedMuscles.includes(m)) selectedMuscles = selectedMuscles.filter(i => i !== m);
                else selectedMuscles.push(m);
            };
            grid.appendChild(div);
        });
    }

    // GENERAR RUTINA
    function generateWorkout() {
        if(selectedMuscles.length === 0) return alert("Selecciona al menos una zona");
        
        const count = document.getElementById('ex-count').value;
        const pool = [];
        selectedMuscles.forEach(m => pool.push(...EXERCISES[m]));
        
        const shuffled = pool.sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, count);

        const list = document.getElementById('workout-list');
        list.innerHTML = '';

        selected.forEach(ex => {
            const imgPath = IMAGES[ex.n] || 'https://via.placeholder.com/300x150?text=GYM+FLOW';
            list.innerHTML += `
                <div class="exercise-card">
                    <img src="${imgPath}" class="ex-img" onclick="showLB(this.src)" onerror="this.src='https://via.placeholder.com/300x150?text=SIN+IMAGEN'">
                    <h3>${ex.n}</h3>
                    <p>${ex.d}</p>
                    <div class="ex-meta">
                        <span>EQUIPO: ${ex.e}</span>
                        <span>${ex.s}</span>
                    </div>
                </div>
            `;
        });
        nav('s-workout');
    }

    function showLB(src) {
        document.getElementById('lb-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    initGrid();
</script>

</body>
</html>
