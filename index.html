<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GYM FLOW</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1c1c28;
    --accent: #f5ff4e;
    --accent2: #ff4e6a;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --border: #2a2a3d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* HOME */
  #s-home { background: var(--bg); position: relative; overflow: hidden; align-items: center; justify-content: center; }
  .home-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 80%, #f5ff4e18 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #ff4e6a14 0%, transparent 55%); pointer-events: none; }
  .home-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; pointer-events: none; }
  .home-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 40px 24px; text-align: center; }
  .logo-badge { background: var(--accent); color: var(--bg); font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px; padding: 5px 14px; border-radius: 100px; animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #f5ff4e55}50%{box-shadow:0 0 0 12px #f5ff4e00} }
  .home-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(72px,22vw,100px); line-height: 0.85; letter-spacing: -2px; }
  .home-title span { color: var(--accent); }
  .home-sub { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 280px; }

  /* BUTTONS */
  .btn-primary { background: var(--accent); color: var(--bg); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; padding: 18px 48px; border-radius: 4px; cursor: pointer; width: 100%; max-width: 300px; transition: transform .15s; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; padding: 16px 20px; border-radius: 4px; cursor: pointer; flex: 1; transition: background .15s; }
  .btn-secondary:active { background: var(--border); }

  /* SELECT */
  #s-select { background: var(--bg); }
  .top-bar { display: flex; align-items: center; padding: 52px 20px 16px; gap: 12px; }
  .back-btn { width: 40px; height: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 18px; transition: background .15s; }
  .back-btn:active { background: var(--border); }
  .top-bar-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
  .select-body { flex: 1; overflow-y: auto; padding: 0 20px 120px; }
  .section-label { font-size: 11px; letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase; margin: 24px 0 12px; }
  .parts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .part-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: all .18s; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; position: relative; overflow: hidden; }
  .part-card .emoji { font-size: 28px; }
  .part-card .part-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 0.5px; line-height: 1.1; }
  .part-card .part-count { font-size: 11px; color: var(--muted); }
  .part-card.selected { border-color: var(--accent); background: #f5ff4e12; }
  .part-card.selected::after { content: '✓'; position: absolute; top: 10px; right: 12px; background: var(--accent); color: var(--bg); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; line-height: 22px; text-align: center; }
  .part-card:active { transform: scale(0.97); }
  .count-row { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; }
  .count-label { font-size: 15px; font-weight: 500; }
  .count-controls { display: flex; align-items: center; gap: 16px; }
  .count-btn { width: 36px; height: 36px; background: var(--border); border: none; border-radius: 8px; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .count-btn:active { background: var(--accent); color: var(--bg); }
  .count-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; min-width: 36px; text-align: center; }
  .bottom-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px 32px; background: linear-gradient(to top, var(--bg) 60%, transparent); z-index: 10; }
  .bottom-cta .btn-primary { max-width: 100%; }

  /* WORKOUT */
  #s-workout { background: var(--bg); }
  .workout-header { padding: 52px 20px 0; display: flex; flex-direction: column; gap: 4px; }
  .workout-meta { display: flex; align-items: center; justify-content: space-between; }
  .workout-tag { font-size: 11px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .workout-progress-text { font-size: 13px; color: var(--muted); }
  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 100px; margin-top: 12px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width .4s ease; }
  .workout-body { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; padding-bottom: 140px; }
  .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; animation: slideUp 0.35s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)} }
  .ex-card-top { padding: 20px; display: flex; gap: 14px; align-items: flex-start; }
  .ex-number { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; color: var(--border); flex-shrink: 0; user-select: none; }
  .ex-info { flex: 1; }
  .ex-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.5px; line-height: 1.1; margin-bottom: 4px; }
  .ex-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .ex-tag { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 9px; border-radius: 100px; font-weight: 500; }
  .tag-equip { background: #f5ff4e18; color: var(--accent); border: 1px solid #f5ff4e33; }
  .tag-muscle { background: #ff4e6a18; color: var(--accent2); border: 1px solid #ff4e6a33; }
  .tag-level { background: #ffffff12; color: var(--muted); border: 1px solid var(--border); }

  .ex-image-wrap { 
  /*position: relative; */
  width: 100%; 
  height: 100px; /* Esta es la altura de la vista previa */
  background: #0d0d16; 
  overflow: hidden; 
  cursor: pointer; 

    /* --- AÑADE ESTO PARA CENTRAR --- */
  /*display: flex;*/
 /* align-items: center;    /* Centrado vertical */
  justify-content: center; /* Centrado horizontal */
}

.ex-image-wrap img { 
  width: 100%;    /* CAMBIA DE 10% A 100% para que llene el ancho */
  height: 100%;   /* AÑADE ESTO para que llene la altura del contenedor */
  display: block; 
  object-fit: cover; 
  transition: transform .3s ease; 
}

.ex-image-wrap:active img { 
  transform: scale(1.02); 
}

.img-placeholder { 
  width: 100%; 
  height: 140px; /* AJUSTA A 140px para que coincida con .ex-image-wrap */
  display: flex; 
  align-items: center; 
  justify-content: center; 
  background: #0d0d16; 
  color: var(--border); 
  font-size: 13px; 
  letter-spacing: 1px; 
}

  .lightbox { display: none; position: fixed; inset: 0; background: #000000ee; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 20px; }

  .ex-desc { padding: 14px 20px 16px; font-size: 13px; color: var(--muted); line-height: 1.65; border-top: 1px solid var(--border); }
  .ex-sets { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .set-pill { background: var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 500; text-align: center; flex: 1; min-width: 60px; }
  .set-pill span { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); }
  .workout-actions { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px 32px; background: linear-gradient(to top, var(--bg) 55%, transparent); display: flex; gap: 10px; }
  .btn-primary.flex1 { flex: 2; max-width: none; }

  #s-done { align-items: center; justify-content: center; padding: 40px 24px; text-align: center; gap: 28px; background: var(--bg); position: relative; overflow: hidden; }
  .done-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 60%, #f5ff4e20 0%, transparent 65%); pointer-events: none; }
  .done-icon { font-size: 72px; animation: pop .5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1} }
  .done-title { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 1px; line-height: 0.9; }
  .done-title span { color: var(--accent); }
  .done-stats { display: flex; gap: 16px; width: 100%; justify-content: center; }
  .done-stat { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; text-align: center; flex: 1; max-width: 120px; }
  .done-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); }
  .done-stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt="">
</div>

<div id="s-home" class="screen active">
  <div class="home-bg"></div>
  <div class="home-grid"></div>
  <div class="home-content">
    <div class="logo-badge">✦ ENTRENAMIENTO SIN MÁQUINAS</div>
    <div class="home-title">GYM<br><span>FLOW</span></div>
    <p class="home-sub">Elige tus zonas a trabajar y recibe ejercicios aleatorios con colchoneta, bandas, mancuernas y banco.</p>
    <button class="btn-primary" onclick="go('s-select')">COMENZAR</button>
  </div>
</div>

<div id="s-select" class="screen">
  <div class="top-bar">
    <div class="back-btn" onclick="go('s-home')">←</div>
    <div class="top-bar-title">Tu sesión</div>
  </div>
  <div class="select-body">
    <div class="section-label">¿Qué quieres trabajar hoy?</div>
    <div class="parts-grid" id="parts-grid"></div>
    <div class="section-label">Ejercicios por sesión</div>
    <div class="count-row">
      <div class="count-label">Ejercicios</div>
      <div class="count-controls">
        <button class="count-btn" onclick="changeCount(-1)">−</button>
        <div class="count-value" id="count-display">6</div>
        <button class="count-btn" onclick="changeCount(1)">+</button>
      </div>
    </div>
  </div>
  <div class="bottom-cta">
    <button class="btn-primary" id="start-btn" onclick="startWorkout()" disabled>GENERAR RUTINA</button>
  </div>
</div>

<div id="s-workout" class="screen">
  <div class="workout-header">
    <div class="workout-meta">
      <div class="workout-tag" id="workout-tag">Sesión activa</div>
      <div class="workout-progress-text" id="progress-text">0 / 0</div>
    </div>
    <div class="progress-bar-wrap">

    </div>
  </div>
  <div class="workout-body" id="workout-body"></div>
  <div class="workout-actions">
    <button class="btn-secondary" onclick="go('s-select')">← VOLVER</button>
    <button class="btn-primary flex1" onclick="shuffleAgain()">OTRA RUTINA ↻</button>
  </div>
</div>

<div id="s-done" class="screen">
  <div class="done-bg"></div>
  <div class="done-icon">🔥</div>
  <div class="done-title">SESIÓN<br><span>LISTA</span></div>
  <div class="done-stats" id="done-stats"></div>
  <button class="btn-primary" onclick="shuffleAgain()">OTRA RUTINA ↻</button>
  <button class="btn-secondary" style="width:100%;max-width:300px;" onclick="go('s-select')">CAMBIAR SELECCIÓN</button>
</div>

let selected = new Set();
let exerciseCount = 6;
let currentWorkout = [];

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function buildPartsGrid() {
  const grid = document.getElementById('parts-grid');
  grid.innerHTML = '';
  BODY_PARTS.forEach(part => {
    const count = EXERCISES[part.id].length;
    const card = document.createElement('div');
    card.className = 'part-card' + (selected.has(part.id) ? ' selected' : '');
    card.innerHTML = `
      <div class="emoji">${part.emoji}</div>
      <div class="part-name">${part.name}</div>
      <div class="part-count">${count} ejercicios</div>`;
    card.addEventListener('click', () => togglePart(part.id, card));
    grid.appendChild(card);
  });
}

function togglePart(id, card) {
  if (selected.has(id)) { selected.delete(id); card.classList.remove('selected'); }
  else { selected.add(id); card.classList.add('selected'); }
  document.getElementById('start-btn').disabled = selected.size === 0;
}

function changeCount(delta) {
  exerciseCount = Math.max(1, Math.min(20, exerciseCount + delta));
  document.getElementById('count-display').textContent = exerciseCount;
}

function getRandomExercises() {
  const pool = [];
  selected.forEach(partId => {
    const part = BODY_PARTS.find(p => p.id === partId);
    EXERCISES[partId].forEach(ex => pool.push({ ...ex, muscle: part.name }));
  });
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, Math.min(exerciseCount, pool.length));
}

function startWorkout() {
  currentWorkout = getRandomExercises();
  renderWorkout();
  go('s-workout');
}

function shuffleAgain() {
  currentWorkout = getRandomExercises();
  renderWorkout();
  go('s-workout');
}

function renderWorkout() {
  const body = document.getElementById('workout-body');
  const total = currentWorkout.length;
  document.getElementById('workout-tag').textContent =
    [...selected].map(id => BODY_PARTS.find(p => p.id === id).name).join(' · ');
  document.getElementById('progress-text').textContent = `${total} ejercicios`;
  document.getElementById('progress-fill').style.width = '100%';
  body.innerHTML = '';

  currentWorkout.forEach((ex, i) => {
    const imgSrc = IMAGES[ex.imgKey] || null;
    const card = document.createElement('div');
    card.className = 'ex-card';
    card.style.opacity = '0';
    setTimeout(() => { card.style.animation = 'slideUp 0.35s ease forwards'; }, i * 70);

    const imgHTML = imgSrc
      ? `<div class="ex-image-wrap" onclick="openLightbox('${imgSrc}')">
           <img src="${imgSrc}" alt="${ex.name}" loading="lazy">
         </div>`
      : `<div class="img-placeholder">SIN IMAGEN</div>`;

    card.innerHTML = `
      <div class="ex-card-top">
        <div class="ex-number">0${i + 1}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-tags">
            <span class="ex-tag tag-equip">${ex.equip}</span>
            <span class="ex-tag tag-muscle">${ex.muscle}</span>
            <span class="ex-tag tag-level">${ex.level}</span>
          </div>
        </div>
      </div>
      ${imgHTML}
      <div class="ex-desc">${ex.desc}</div>
      <div class="ex-sets">
        <div class="set-pill"><span>${ex.sets.split('×')[0].trim()}</span>Series</div>
        <div class="set-pill"><span>${ex.sets.split('×')[1]?.trim() || '–'}</span>Reps</div>
        <div class="set-pill"><span>${ex.reps}</span>Descanso</div>
      </div>`;
    body.appendChild(card);
  });

  document.getElementById('done-stats').innerHTML = `
    <div class="done-stat"><div class="done-stat-val">${total}</div><div class="done-stat-lbl">Ejercicios</div></div>
    <div class="done-stat"><div class="done-stat-val">${selected.size}</div><div class="done-stat-lbl">Zonas</div></div>`;
}

buildPartsGrid();
</script>
